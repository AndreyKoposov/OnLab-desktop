<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онтологический анализ процессов</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="app">
        <!-- Левая колонка: список процессов в стиле чатов -->
        <div class="process-list">
           <div class="process-list-header">
               <span>📋 Процессы</span>
               <span class="process-count" id="processCount">8 активных</span>
               <button class="add-process-btn" id="addProcessBtn" title="Добавить новый процесс">+</button>
           </div>
           <div class="process-items" id="processItems">
               <!-- Процессы будут динамически добавляться сюда -->
           </div>
           <!-- Небольшой футер в левой колонке -->
           <div class="process-footer">
               ⚙️ последнее обновление 10 мин назад
           </div>
        </div>
        <!-- Правая колонка: кнопки + контент -->
        <div class="main-panel">
            <!-- Индикатор состояния соединения -->
            <div class="connection-status" id="connectionStatus">
                <div class="status-indicator" id="statusIndicator"></div>
                <span class="status-text" id="statusText">Соединение установлено</span>
            </div>
            <!-- Шесть кнопок -->
            <div class="button-bar">
                <button class="tab-btn active" id="btn1">Кнопка 1</button>
                <button class="tab-btn" id="btn2">Кнопка 2</button>
                <button class="tab-btn" id="btn3">Кнопка 3</button>
                <button class="tab-btn" id="btn4">Кнопка 4</button>
                <button class="tab-btn" id="btn5">Кнопка 5</button>
                <button class="tab-btn" id="btn6">Кнопка 6</button>
            </div>

            <!-- Динамический контент -->
            <div class="content-area" id="contentArea">
                
            </div>
        </div>
    </div>

    <script src="/eel.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/gui.js"></script>
    <script src="js/checker.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
